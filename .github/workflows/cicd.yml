name: CI/CD

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/cicd.yml"
      - ".dockerignore"
      - "Dockerfile"
      - "app/**"
      - "deploy/**"
      - "pyproject.toml"
      - "tests/**"
      - "uv.lock"
  push:
    branches: [main]
    paths:
      - ".github/workflows/cicd.yml"
      - ".dockerignore"
      - "Dockerfile"
      - "app/**"
      - "deploy/**"
      - "pyproject.toml"
      - "tests/**"
      - "uv.lock"
  workflow_dispatch:

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

env:
  APP_PORT: "${{ vars.APP_PORT || '8001' }}"
  AWS_REGION: "${{ vars.AWS_REGION || 'ap-northeast-2' }}"
  CONTAINER_NAME: aiserver1

permissions:
  contents: read

jobs:
  quality:
    name: Test and lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up uv
        uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
        with:
          version: "0.11.8"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Run lint and formatting checks
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Run tests
        run: uv run pytest

  container:
    name: Build and publish image
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    outputs:
      digest: "${{ steps.build.outputs.digest }}"
      image: "${{ steps.image.outputs.name }}"
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Normalize image name
        id: image
        shell: bash
        run: |
          image_name="$(printf '%s' "ghcr.io/${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          echo "name=${image_name}" >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: "${{ github.actor }}"
          password: "${{ secrets.GITHUB_TOKEN }}"

      - name: Generate image metadata
        id: metadata
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: "${{ steps.image.outputs.name }}"
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build and publish image
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: "${{ github.event_name != 'pull_request' }}"
          tags: "${{ steps.metadata.outputs.tags }}"
          labels: "${{ steps.metadata.outputs.labels }}"
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

  deploy:
    name: Deploy to EC2
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: container
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
      packages: read
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Validate deployment variables
        env:
          AWS_ROLE_ARN: "${{ vars.AWS_ROLE_ARN }}"
          EC2_INSTANCE_ID: "${{ vars.EC2_INSTANCE_ID }}"
        run: |
          test -n "${AWS_ROLE_ARN}" || { echo "AWS_ROLE_ARN repository variable is required" >&2; exit 1; }
          test -n "${EC2_INSTANCE_ID}" || { echo "EC2_INSTANCE_ID repository variable is required" >&2; exit 1; }

      - name: Configure AWS credentials through OIDC
        uses: aws-actions/configure-aws-credentials@cabfdba3510de1431bac9dba27511d97497fc100 # v5
        with:
          role-to-assume: "${{ vars.AWS_ROLE_ARN }}"
          role-session-name: "aiserver1-${{ github.run_id }}"
          aws-region: "${{ env.AWS_REGION }}"
          mask-aws-account-id: true

      - name: Deploy immutable image through SSM
        env:
          EC2_INSTANCE_ID: "${{ vars.EC2_INSTANCE_ID }}"
          GHCR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          GHCR_USERNAME: "${{ github.actor }}"
          IMAGE: "${{ needs.container.outputs.image }}@${{ needs.container.outputs.digest }}"
        shell: bash
        run: |
          token_parameter="/aiserver1/deploy/${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}/ghcr-token"
          cleanup_parameter() {
            aws ssm delete-parameter \
              --name "${token_parameter}" \
              --region "${AWS_REGION}" >/dev/null 2>&1 || true
          }
          trap cleanup_parameter EXIT

          aws ssm put-parameter \
            --name "${token_parameter}" \
            --type SecureString \
            --value "${GHCR_TOKEN}" \
            --region "${AWS_REGION}" >/dev/null

          script_base64="$(base64 < deploy/ec2-deploy.sh | tr -d '\n')"
          parameters="$(
            jq -cn \
              --arg script "${script_base64}" \
              --arg image "${IMAGE}" \
              --arg container "${CONTAINER_NAME}" \
              --arg port "${APP_PORT}" \
              --arg region "${AWS_REGION}" \
              --arg username "${GHCR_USERNAME}" \
              --arg token_parameter "${token_parameter}" \
              '{
                commands: [
                  ("printf %s " + ($script | @sh) + " | base64 --decode > /tmp/aiserver1-deploy.sh"),
                  "chmod 700 /tmp/aiserver1-deploy.sh",
                  (
                    "IMAGE=" + ($image | @sh) +
                    " CONTAINER_NAME=" + ($container | @sh) +
                    " APP_PORT=" + ($port | @sh) +
                    " AWS_REGION=" + ($region | @sh) +
                    " GHCR_USERNAME=" + ($username | @sh) +
                    " GHCR_TOKEN_PARAMETER=" + ($token_parameter | @sh) +
                    " /tmp/aiserver1-deploy.sh"
                  ),
                  "rm -f /tmp/aiserver1-deploy.sh"
                ]
              }'
          )"

          command_id="$(
            aws ssm send-command \
              --instance-ids "${EC2_INSTANCE_ID}" \
              --document-name AWS-RunShellScript \
              --comment "Deploy ${IMAGE}" \
              --parameters "${parameters}" \
              --query Command.CommandId \
              --output text \
              --region "${AWS_REGION}"
          )"

          status="Pending"
          for _ in $(seq 1 120); do
            status="$(
              aws ssm get-command-invocation \
                --command-id "${command_id}" \
                --instance-id "${EC2_INSTANCE_ID}" \
                --query Status \
                --output text \
                --region "${AWS_REGION}" 2>/dev/null || true
            )"

            case "${status}" in
              Success|Cancelled|Failed|TimedOut)
                break
                ;;
            esac

            sleep 5
          done

          aws ssm get-command-invocation \
            --command-id "${command_id}" \
            --instance-id "${EC2_INSTANCE_ID}" \
            --query '{Status:Status,Output:StandardOutputContent,Error:StandardErrorContent}' \
            --output json \
            --region "${AWS_REGION}"

          test "${status}" = "Success"
